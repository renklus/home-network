apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: 'default'
  sources:
  - repoURL: 'https://metallb.github.io/metallb'
    chart: 'metallb'
    targetRevision: '0.16.1'
    helm:
      valuesObject:
        speaker:
          image:
            repository: 'quay.io/metallb/speaker'
            tag: 'v0.16.1@sha256:16561e96531e1852d5c229ad7fae6e994dcfa983ff7f4de6b6208b34a4e2ddbc'
          frr:
            image:
              repository: 'quay.io/frrouting/frr'
              tag: '10.6.1@sha256:813497af103e972600f6161012b3bf2a2a1c5ea10d09cd1eacd74f1dc510a57b'
        controller:
          image:
            repository: 'quay.io/metallb/controller'
            tag: 'v0.16.1@sha256:f51ab515de9ccd20dc3dccb093e48df8adddac019326c456f449e55ba91b6420'
  - path: k8s/apps/app-of-infrastructure-apps/metallb
    repoURL: 'https://github.com/renklus/home-network'
    targetRevision: HEAD
  destination:
    namespace: metallb-system
    name: in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
# workaround for MetalLB problem: leave until https://github.com/metallb/metallb/issues/1681 is fixed
#  ignoreDifferences:
#  - group: 'apiextensions.k8s.io'
#    kind: 'CustomResourceDefinition'
#    name: 'bgppeers.metallb.io'
#    jsonPointers:
#      - '/spec/conversion/webhook/clientConfig/caBundle'
