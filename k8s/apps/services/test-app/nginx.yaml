apiVersion: v1
kind: Namespace
metadata:
  name: test-nginx-argo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nginx
  namespace: test-nginx-argo
spec:
  selector:
    matchLabels:
      app: my-nginx
  template:
    metadata:
      labels:
        app: my-nginx
        x: unused
    spec:
      containers:
      - name: my-nginx
        imagePullPolicy: Always
        image: renklus/my-nginx:0.0.4-pre@sha256:220eb5542a0dcaf76486a6b7917db33ee4ac497372bff636d01783142d609092
        ports:
        - containerPort: 80
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: test-nginx
  namespace: test-nginx-argo
spec:
  type: LoadBalancer
  selector:
    app: my-nginx
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http