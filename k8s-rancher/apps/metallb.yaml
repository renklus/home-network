apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-rancher
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  sources:
  - repoURL: 'https://metallb.github.io/metallb'
    chart: 'metallb'
    targetRevision: '0.15.3'
    helm:
      valuesObject:
        speaker:
          image:
            repository: 'quay.io/metallb/speaker'
            tag: 'v0.15.3@sha256:c6a5b25b2e1fba610a57b2db4bb8141d7c133569d561a8cc29e38ca5113efbc4'
          frr:
            image:
              repository: 'quay.io/frrouting/frr'
              tag: '10.6.1@sha256:813497af103e972600f6161012b3bf2a2a1c5ea10d09cd1eacd74f1dc510a57b'
        controller:
          image:
            repository: 'quay.io/metallb/controller'
            tag: 'v0.15.3@sha256:6698ccc54c380913816ed1fd0758637ec87dd79da419c4ab170a2c26c158ab89'
  - path: k8s-rancher/apps/metallb
    repoURL: 'https://github.com/renklus/home-network'
    targetRevision: HEAD
  project: rancher-cluster
  destination:
    namespace: metallb-system
    name: in-cluster
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true