# https://argo-cd.readthedocs.io/en/stable/user-guide/projects/
# prevent everything in the default project (forces every application to choose a project explicitly)
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: default
spec:
  sourceRepos: []
  sourceNamespaces: []
  destinations: []
  namespaceResourceBlacklist:
  - group: '*'
    kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: rancher-cluster
spec:
  sourceRepos:
  - '*'
  destinations:
  - namespace: '*'
    name: 'in-cluster'
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod-cluster
spec:
  sourceRepos:
  - '*'
  destinations:
  - namespace: '!argocd'
    name: '*'
  - namespace: '*'
    name: 'prod'
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  clusterResourceBlacklist:
  - group: '*'
    kind: 'Application'