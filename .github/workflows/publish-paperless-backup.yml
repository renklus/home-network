name: Publish paperless-backup image

on:
  push:
    branches: ["main"]
    paths:
      - 'images/paperless-backup/**'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write


# alternative steps without QEMU: https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images#publishing-images-to-github-packages
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build tag
        id: calc
        run: |
          echo "image_version=$((GITHUB_RUN_NUMBER + 20))" >> $GITHUB_OUTPUT
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Create image metadata (tags)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/renklus/paperless-ngx-backup
          tags: |
            type=ref,event=branch
            type=sha
            type=ref,event=tag
            # unique per-run version so every workflow execution produces a new image
            type=raw,value=v${{ steps.calc.outputs.image_version }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ./images/paperless-backup
          file: ./images/paperless-backup/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
