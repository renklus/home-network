name: Publish paperless-backup image

on:
  push:
    branches: ["main"]
    paths:
      - 'images/paperless-backup/**'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write


# alternative steps without QEMU: https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images#publishing-images-to-github-packages
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build tag
        id: calc
        run: |
          echo "image_version=$((GITHUB_RUN_NUMBER + 20))" >> $GITHUB_OUTPUT
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Create image metadata (tags)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/renklus/paperless-ngx-backup
          tags: |
            type=ref,event=branch
            type=sha
            type=ref,event=tag
            # unique per-run version so every workflow execution produces a new image
            type=raw,value=v${{ steps.calc.outputs.image_version }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./images/paperless-backup
          file: ./images/paperless-backup/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
