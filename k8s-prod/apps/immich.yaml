apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  sources:
  - repoURL: 'ghcr.io/immich-app/immich-charts'
    chart: 'immich'
    targetRevision: '0.12.0'
    helm:
      parameters:
        # - name: 'controllers.main.containers.main.env.REDIS_HOSTNAME'
        #   value: ''
        # - name: 'controllers.main.containers.main.env.IMMICH_MACHINE_LEARNING_URL'
        #   value: ''
        - name: 'immich.persistence.library.existingClaim'
          value: 'immich-media'
        - name: 'valkey.enabled'
          value: 'true'
        - name: 'valkey.persistence.data.type'
          value: 'persistentVolumeClaim'
        - name: 'valkey.persistence.data.storageClass'
          value: 'truenas-nfs-hard'
        - name: 'server.ingress.main.enabled'
          value: 'true'
        # - name: 'server.ingress.main.hosts'
        #   value: ''
        - name: 'machine-learning.persistence.cache.type'
          value: 'persistentVolumeClaim'
        - name: 'machine-learning.persistence.cache.storageClass'
          value: 'truenas-nfs-hard'
      valuesObject:
        # controllers:
        #   main:
        #     containers:
        #       main:
        #         image:
        #           repository: '_______________________________________quay.io/metallb/speaker'
        #           tag: 'v2.0.0'
        immich:
          configuration: {} # immich-config.json converted to yaml (https://immich.app/docs/install/config-file/)
        valkey:
          controllers:
            main:
              containers:
                main:
                  image:
                    repository: 'docker.io/valkey/valkey'
                    tag: '9.1-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd'
        server:
          controllers:
            main:
              containers:
                main:
                  image:
                    repository: 'ghcr.io/immich-app/immich-server'
                    tag: 'v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5'
        machineLearning:
          controllers:
            main:
              containers:
                main:
                  image:
                    repository: 'ghcr.io/immich-app/immich-machine-learning'
                    tag: 'v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3'
  - path: k8s-prod/apps/immich
    repoURL: 'https://github.com/renklus/home-network'
    targetRevision: HEAD
  project: prod-cluster
  destination:
    namespace: immich
    name: prod
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true