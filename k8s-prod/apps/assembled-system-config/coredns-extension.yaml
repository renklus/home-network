# adapted from https://www.reddit.com/r/homelab/comments/ipsc4r/howto_k8s_metallb_and_external_dns_access_for/
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system # must be exactly this namespace to apply to the default coredns installation
data:
  k8s_external.server: |
    prod.k8s.renklus.ch:53 {
        kubernetes
        k8s_external prod.k8s.renklus.ch
    }
